name: "Bug Report"
description: "File a report to help us identify and fix the issue."
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this issue! Please fill out this form as accurately as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Provide a clear and concise description of what the problem is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps needed to trigger the bug.
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs Actual Behavior
      description: What did you expect to happen, and what happened instead?
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: In which environment does this issue occur?
      options:
        - Production
        - Staging / Testing
        - Local Development
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Software Version
      description: Indicate the application version (e.g., v1.2.3).
      placeholder: vX.Y.Z
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Preliminary Checks
      description: Confirm you completed these steps before submitting the report.
      options:
        - label: I have searched existing issues and found no duplicates.
          required: true
        - label: I am using the latest available version of the software.
          required: true
